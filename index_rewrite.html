<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>城主村莊測試版 Rewrite</title>
  <link rel="stylesheet" href="./rewrite.css" />
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <div class="title-row">
        <div>
          <h1>城主村莊測試版 Rewrite</h1>
          <div class="muted small">三檔版基礎架構：HTML、CSS、JS 已拆開，方便你後面再分成 data / state / render / actions。</div>
        </div>
        <div class="row">
          <button id="saveBtn">存檔</button>
          <button id="loadBtn">讀檔</button>
          <button id="resetBtn">重置</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">金幣</div>
          <div class="stat-value" id="gold">0</div>
          <div class="small muted">打工可獲得</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">主等級</div>
          <div class="stat-value">Lv.<span id="level">1</span></div>
          <div class="bar"><div id="expBar" class="fill exp"></div></div>
          <div class="small muted">EXP：<span id="exp">0</span> / <span id="expNext">5</span></div>
        </div>

        <div class="stat-card">
          <div class="stat-label">體力</div>
          <div class="stat-value"><span id="stamina">100</span> / <span id="maxStamina">100</span></div>
          <div class="bar"><div id="staminaBar" class="fill stamina"></div></div>
          <div class="small muted">工作與製作都會消耗</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">快速操作</div>
          <div class="row">
            <button id="restBtn">休息 +5 體力</button>
            <button id="eatBestBtn">吃最佳食物</button>
          </div>
          <div class="small muted" id="eatHint">目前沒有可吃的食物</div>
        </div>
      </div>
    </section>

    <div class="grid-2">
      <div>
<section class="panel">
  <h2>手動工作</h2>

  <div class="action-lane">
    <div id="actionStatus" class="action-status">目前沒有進行中的工作</div>
    <div class="bar action-bar">
      <div id="actionProgressBar" class="fill action"></div>
    </div>
    <div id="actionQueue" class="queue-row">
      <span class="small muted">行動列為空</span>
    </div>
    <div class="row" style="margin-top:8px;">
      <button id="cancelActionBtn">取消目前工作</button>
      <button id="clearActionQueueBtn">清空行動列</button>
    </div>
  </div>

  <div class="button-grid" id="workButtons"></div>
  <div class="small muted" style="margin-top:10px;">
    現在點工作按鈕時，若已有工作進行中，會自動加入行動列。行動列最多 3 個。
  </div>
</section>

        <section class="panel">
          <h2>製作與加工</h2>
          <div class="recipe-list" id="craftList"></div>
        </section>

        <section class="panel">
          <h2>資源倉庫</h2>
          <div id="resources" class="resource-list"></div>
        </section>
      </div>

      <section class="panel">
        <h2>事件紀錄</h2>
        <div id="log" class="log"></div>
      </section>
    </div>
  </div>

  <script src="./js/main.js" defer></script>
</body>
</html>
