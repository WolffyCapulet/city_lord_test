<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>城主村莊測試版</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="wrap">
    <section class="panel header">
      <div class="header-top">
        <div>
          <h1 id="gameTitle">城主村莊測試版</h1>
          <div id="gameVersionNote" class="muted small">模組化重構版</div>
        </div>

        <div class="header-actions">
          <button id="saveBtn" class="tiny-btn" type="button">存檔</button>
          <button id="loadBtn" class="tiny-btn" type="button">讀檔</button>
          <button id="resetBtn" class="tiny-btn" type="button">重置</button>
        </div>
      </div>

      <div class="top-grid">
        <div class="stat">
          <div>金幣</div>
          <strong id="gold">0</strong>
          <div class="small muted">打工可獲得</div>
        </div>

        <div class="stat">
          <div>主等級 <strong id="level">1</strong></div>
          <div class="bar"><div id="expBar" class="fill exp"></div></div>
          <div class="small muted"><span id="exp">0</span> / <span id="expNext">5</span> EXP</div>
        </div>

        <div class="stat">
          <div>體力 <strong id="stamina">100</strong> / <span id="maxStamina">100</span></div>
          <div class="bar"><div id="staminaBar" class="fill"></div></div>
          <div class="small muted">工作與製作都會消耗</div>
        </div>

        <div class="stat">
          <div>快速操作</div>
          <div class="row" style="margin-top:8px">
            <button id="restBtn" class="tiny-btn" type="button">休息</button>
            <button id="eatBestBtn" class="tiny-btn" type="button">吃最佳食物</button>
          </div>
          <div class="small muted" id="eatHint" style="margin-top:8px">目前沒有可吃的食物</div>
        </div>
      </div>
    </section>

    <div class="layout">
      <nav class="panel nav-rail" id="mainNav">
        <button class="nav-btn active" data-main-nav="production" type="button">生產與製作</button>
        <button class="nav-btn" data-main-nav="log" type="button">事件紀錄</button>
      </nav>

      <div class="main-stack">
        <section class="panel main-page-panel" data-main-page="production">
          <div class="section-title">
            <h2 style="margin:0">動手工作與製作加工</h2>
          </div>

          <div id="actionLanes" class="lane-grid">
            <div class="lane-card">
              <div class="lane-label" id="productionText">目前沒有進行中的工作</div>
              <div class="bar"><div id="productionBar" class="fill action"></div></div>
              <div id="productionQueue" class="craft-queue">
                <span class="small muted">行動列為空</span>
              </div>

              <div class="row" style="margin-top:8px">
                <button id="cancelActionBtn" class="tiny-btn" type="button">取消目前工作</button>
                <button id="clearActionQueueBtn" class="tiny-btn" type="button">清空行動列</button>
              </div>
            </div>

            <div class="lane-card">
              <div class="lane-label" id="craftText">製作區</div>
              <div class="bar"><div id="craftBar" class="fill action"></div></div>
              <div id="craftQueueTop" class="craft-queue">
                <span class="small muted">目前沒有製作佇列</span>
              </div>
            </div>

            <div class="lane-card">
              <div class="lane-label" id="researchText">研究區</div>
              <div class="bar"><div id="researchBar" class="fill exp"></div></div>
              <div id="researchQueue" class="craft-queue">
                <span class="small muted">目前沒有研究佇列</span>
              </div>
            </div>
          </div>

          <h3 style="margin:16px 0 8px">手動工作</h3>
          <div id="workButtons" class="compact-actions"></div>

          <h3 style="margin:16px 0 8px">製作與加工</h3>
          <div id="craftList" class="recipe-list"></div>
        </section>

        <section class="panel log-panel main-page-panel page-hidden" data-main-page="log">
          <div class="section-title">
            <h2 style="margin:0">事件紀錄</h2>
            <div class="row">
              <button id="logAllBtn" class="tiny-btn" type="button">全部</button>
              <button id="logImportantBtn" class="tiny-btn" type="button">重要訊息</button>
              <button id="logLootBtn" class="tiny-btn" type="button">獲取訊息</button>
              <button id="logWorkerBtn" class="tiny-btn" type="button">工人訊息</button>
            </div>
          </div>

          <div id="log" class="log"></div>
        </section>
      </div>

      <aside class="sidebar">
        <section class="panel">
          <div class="resource-head">
            <h2 style="margin:0">資源倉庫</h2>
          </div>
          <div class="small muted" style="margin-top:8px">目前持有的所有資源</div>
          <div id="resources" class="resource-list" style="margin-top:12px"></div>
        </section>
      </aside>
    </div>
  </div>

  <div id="resetModal" class="modal-backdrop" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="resetTitle">
      <h3 id="resetTitle">確認重置存檔</h3>
      <div class="small muted">這會清除目前存檔，無法復原。</div>

      <label class="check-row small">
        <input id="resetAcknowledge" type="checkbox" />
        <span>我已確認要永久刪除目前遊戲進度。</span>
      </label>

      <div class="modal-actions">
        <button id="resetCancelBtn" class="tiny-btn" type="button">取消</button>
        <button id="resetConfirmBtn" class="tiny-btn" type="button" disabled>確認重置</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/app/main.js"></script>
</body>
</html>
